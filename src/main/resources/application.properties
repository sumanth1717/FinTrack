spring.application.name=tracker

# Default Database: H2 In-Memory (For Job Portfolio / Easy Setup)
spring.datasource.url=jdbc:h2:mem:financetracker;MODE=MySQL;NON_KEYWORDS=MONTH,YEAR,TYPE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Auto-initialize database with schema.sql and data.sql
spring.sql.init.mode=always

# H2 Console (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JDBC
spring.jdbc.template.query-timeout=30

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Logging
logging.level.org.springframework=INFO
logging.level.com.finance=DEBUG