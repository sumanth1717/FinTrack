<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - FinTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0c10;
            --bg-card: rgba(22, 25, 33, 0.6);
            --bg-card2: rgba(30, 34, 45, 0.8);
            --accent: #7b61ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a5ba;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: 'Outfit', sans-serif; 
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: -200px; left: -100px;
            width: 600px; height: 600px; background: var(--accent);
            filter: blur(200px); opacity: 0.15; z-index: -1; border-radius: 50%;
        }
        .glass-box {
            background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); box-shadow: var(--shadow);
            border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-icon { 
            width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), #ff3d71); 
            border-radius: 14px; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; color: white; margin: 0 auto 20px; box-shadow: 0 4px 15px rgba(123, 97, 255, 0.4);
        }
        .title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 30px; letter-spacing: -0.5px;}
        .form-control { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-family: 'Outfit'; height: 50px; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.15); background: var(--bg-card2); color: white;}
        .form-control::placeholder { color: var(--text-secondary); }
        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--accent), #9683ff); border: none; border-radius: 12px; padding: 14px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(123, 97, 255, 0.3); height: 50px; margin-top: 10px;}
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4); }
        .link-text { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
        .link-text a { color: var(--accent); text-decoration: none; font-weight: 500; transition: color 0.2s;}
        .link-text a:hover { color: #9683ff; }
        .alert-error { background: rgba(255, 61, 113, 0.1); border: 1px solid rgba(255, 61, 113, 0.3); color: #ff3d71; border-radius: 10px; padding: 10px; font-size: 13px; text-align: center; margin-bottom: 20px;}
        .alert-success { background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.3); color: #00e676; border-radius: 10px; padding: 10px; font-size: 13px; text-align: center; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div class="glass-box">
        <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
        <div class="title">Welcome back</div>
        
        <div th:if="${param.error}" class="alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert-success">You have been logged out.</div>
        <div th:if="${param.registered}" class="alert-success">Registration successful. Please log in.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" placeholder="Username" required autofocus>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <div class="link-text">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
</body>
</html>
