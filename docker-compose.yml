version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fintrack-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ABdevilliers@17
      MYSQL_DATABASE: financetracker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Optionally mount a script to auto-run the phase 1-3 SQL commands, 
      # but application-mysql.properties can handle schema initialization if configured.
      # Since we have schema.sql, we can enable it for the mysql profile too!

  app:
    build: .
    container_name: fintrack-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      # Override the localhost URL to point to the 'db' container
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/financetracker
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ABdevilliers@17
      # Auto-initialize the schema using schema.sql and data.sql
      - SPRING_SQL_INIT_MODE=always

volumes:
  db_data:
